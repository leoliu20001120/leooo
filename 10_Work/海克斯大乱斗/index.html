<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海克斯大乱斗 · AI教练符文推荐 Demo</title>
<style>
  /* ========== Reset & Base ========== */
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0e1a;
    color: #e0e6f0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========== Background Layer (simulated game) ========== */
  .game-bg {
    position: fixed; inset:0;
    background: linear-gradient(135deg, #0d1321 0%, #1a1f3a 40%, #0d1321 100%);
    z-index: 0;
  }
  .game-bg::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 80%, rgba(30,60,120,0.3) 0%, transparent 70%);
  }
  .game-bg-text {
    position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
    font-size: 28px; color: rgba(255,255,255,0.06); letter-spacing: 8px;
    text-transform: uppercase; user-select:none;
  }

  /* ========== Overlay (the selection modal) ========== */
  .hex-overlay {
    position: fixed; inset:0; z-index: 10;
    background: rgba(6,10,22,0.92);
    backdrop-filter: blur(12px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* ========== Header ========== */
  .hex-header {
    text-align: center; margin-bottom: 8px;
  }
  .hex-header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(90deg, #c9a84c, #f0d678, #c9a84c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
  }
  .hex-header .subtitle {
    font-size: 13px; color: #7a8399; margin-top: 4px;
  }
  .hero-info {
    display: flex; align-items: center; gap: 8px;
    justify-content: center; margin: 8px 0 4px;
  }
  .hero-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid #c9a84c; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a2744, #2a3a5c);
    font-size: 18px;
  }
  .hero-name { font-size: 14px; color: #c9a84c; font-weight: 600; }
  .hero-role { font-size: 12px; color: #7a8399; }
  .stage-badge {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
    font-size: 11px; color: #c9a84c; margin-top: 4px;
  }

  /* ========== Cards Container ========== */
  .cards-row {
    display: flex; gap: 20px; margin: 16px 0 12px;
    justify-content: center; flex-wrap: wrap;
  }
  /* 品质标题 — 显示在卡片组上方 */
  .quality-title {
    text-align: center; margin-bottom: 4px;
    font-size: 13px; font-weight: 600; letter-spacing: 2px;
  }
  .quality-title.silver { color: #8a9aaa; }
  .quality-title.gold { color: #daa520; }
  .quality-title.prismatic { color: #b388ff; }

  /* ========== Rune Card — 参考真实游戏卡牌风格 ========== */
  .rune-card {
    width: 240px; border-radius: 14px; overflow: hidden;
    background: linear-gradient(180deg, #111926 0%, #0c1220 60%, #0a0f1a 100%);
    cursor: pointer; transition: all 0.3s ease;
    position: relative;
    display: flex; flex-direction: column;
  }
  /* 卡片外框 — 按品质变色 */
  .rune-card.quality-silver {
    border: 2px solid #4a5060;
    box-shadow: 0 4px 20px rgba(100,110,130,0.15);
  }
  .rune-card.quality-gold {
    border: 2px solid #8a7330;
    box-shadow: 0 4px 20px rgba(180,150,50,0.15);
  }
  .rune-card.quality-prismatic {
    border: 2px solid #7a5aaa;
    box-shadow: 0 4px 20px rgba(160,100,220,0.15);
  }
  .rune-card:hover { transform: translateY(-6px); }
  .rune-card.quality-silver:hover { box-shadow: 0 8px 30px rgba(100,110,130,0.3); border-color: #6a7080; }
  .rune-card.quality-gold:hover { box-shadow: 0 8px 30px rgba(200,170,60,0.3); border-color: #c9a84c; }
  .rune-card.quality-prismatic:hover { box-shadow: 0 8px 30px rgba(160,100,220,0.3); border-color: #b388ff; }
  .rune-card.selected.quality-silver { border-color: #8a9aaa; box-shadow: 0 0 24px rgba(130,150,180,0.4); }
  .rune-card.selected.quality-gold { border-color: #ffd700; box-shadow: 0 0 24px rgba(255,215,0,0.4); }
  .rune-card.selected.quality-prismatic { border-color: #d8a0ff; box-shadow: 0 0 24px rgba(200,140,255,0.4); }

  /* 卡片顶部装饰角 — 模拟游戏中的金属边角 */
  .card-corner-tl, .card-corner-tr {
    position: absolute; top: 0; width: 28px; height: 28px; z-index: 3;
  }
  .card-corner-tl { left: 0; border-top: 2px solid; border-left: 2px solid; border-radius: 14px 0 0 0; }
  .card-corner-tr { right: 0; border-top: 2px solid; border-right: 2px solid; border-radius: 0 14px 0 0; }
  .quality-silver .card-corner-tl, .quality-silver .card-corner-tr { border-color: #6a7888; }
  .quality-gold .card-corner-tl, .quality-gold .card-corner-tr { border-color: #c9a84c; }
  .quality-prismatic .card-corner-tl, .quality-prismatic .card-corner-tr { border-color: #b388ff; }

  /* Grade badge */
  .grade-badge {
    position: absolute; top: 10px; right: 10px;
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900; z-index: 4;
  }
  .grade-A { background: linear-gradient(135deg, #ffd700, #ff9500); color: #1a0e00; box-shadow: 0 0 12px rgba(255,215,0,0.5); }
  .grade-S { background: linear-gradient(135deg, #ffd700, #ff6b00, #ffd700); color: #1a0e00; box-shadow: 0 0 18px rgba(255,180,0,0.7); animation: shimmer 1.5s infinite; }
  .grade-B { background: linear-gradient(135deg, #4a90d9, #6db3f2); color: #0a1a30; }
  .grade-C { background: rgba(255,255,255,0.15); color: #aab4c8; }
  .grade-D { background: rgba(80,80,90,0.15); color: #555; }

  /* ? icon for runes needing extra explanation */
  .help-icon {
    position: absolute; top: 10px; right: 46px;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; z-index: 4;
    cursor: pointer; transition: all 0.2s;
    background: rgba(255,255,255,0.1);
    color: #8a94a8; border: 1px solid rgba(255,255,255,0.15);
  }
  .help-icon:hover { background: rgba(255,255,255,0.2); color: #c9a84c; border-color: rgba(201,168,76,0.4); }

  /* A级卡牌光晕 */
  .rune-card.glow-a::before {
    content:''; position:absolute; inset:-2px; border-radius:16px;
    background: linear-gradient(135deg, rgba(255,215,0,0.12), transparent 40%, rgba(255,215,0,0.12));
    z-index:0; animation: shimmer 2.5s infinite;
  }
  /* S级天胡卡牌光晕 — 更强烈 */
  .rune-card.glow-s::before {
    content:''; position:absolute; inset:-3px; border-radius:16px;
    background: linear-gradient(135deg, rgba(255,180,0,0.2), rgba(255,100,0,0.1), rgba(255,215,0,0.2));
    z-index:0; animation: shimmer 1.5s infinite;
  }
  .rune-card.glow-s::after {
    content:''; position:absolute; inset:-1px; border-radius:16px;
    background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,0.08) 50%, transparent 60%);
    z-index:0; animation: shine 2s infinite linear;
  }
  @keyframes shine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  @keyframes shimmer {
    0%,100% { opacity:0.3 } 50% { opacity:0.9 }
  }
  .rune-card.glow-b::before {
    content:''; position:absolute; inset:-2px; border-radius:16px;
    background: linear-gradient(135deg, rgba(74,144,217,0.08), transparent 40%, rgba(74,144,217,0.08));
    z-index:0; animation: shimmer 3s infinite;
  }

  /* Reroll rate display */
  .reroll-rate {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    font-size: 11px; padding: 4px 14px;
    position: relative; z-index: 1;
  }
  .reroll-rate .label { color: #6a7488; }
  .reroll-rate .value { font-weight: 600; }
  .reroll-rate .value.high { color: #ffa500; }
  .reroll-rate .value.low { color: #555; }
  .reroll-rate .value.mid { color: #7aa0cc; }

  /* 品质顶部条纹 */
  .quality-stripe {
    height: 3px; width: 100%;
  }
  .quality-silver { background: linear-gradient(90deg, transparent, #6a7888, #9aa8b8, #6a7888, transparent); }
  .quality-gold { background: linear-gradient(90deg, transparent, #8a6a20, #ffd700, #8a6a20, transparent); }
  .quality-prismatic { background: linear-gradient(90deg, transparent, #ff6b6b, #ffd700, #6bff6b, #6bb5ff, #d76bff, transparent); }

  /* 图标区域 — 更大更突出 */
  .rune-icon-area {
    height: 120px; display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    background: radial-gradient(ellipse at 50% 60%, rgba(30,40,70,0.5) 0%, transparent 70%);
  }
  .rune-icon {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    position: relative;
    transition: transform 0.3s;
  }
  .rune-card:hover .rune-icon { transform: scale(1.08); }
  .rune-icon.silver { background: radial-gradient(circle, #3a4060 0%, #1e2438 100%); border: 2px solid #5a6878; box-shadow: 0 0 20px rgba(100,120,150,0.2); }
  .rune-icon.gold { background: radial-gradient(circle, #3a3010 0%, #1e1a08 100%); border: 2px solid #b8960b; box-shadow: 0 0 20px rgba(200,170,50,0.2); }
  .rune-icon.prismatic { background: radial-gradient(circle, #2a1a3a 0%, #1a1030 100%); border: 2px solid #9b59b6; box-shadow: 0 0 20px rgba(155,89,182,0.25); }
  /* 图标光圈 */
  .rune-icon::after {
    content: ''; position: absolute; inset: -6px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* 卡片内容 */
  .rune-body { padding: 0 14px 10px; text-align:center; position:relative; z-index:1; flex: 1; }
  .rune-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; }
  .rune-type-label {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 600; margin-bottom: 8px;
  }
  .rune-type-label.silver { background: rgba(100,120,150,0.15); color: #8a9aaa; border: 1px solid rgba(100,120,150,0.2); }
  .rune-type-label.gold { background: rgba(200,170,50,0.12); color: #daa520; border: 1px solid rgba(200,170,50,0.2); }
  .rune-type-label.prismatic { background: rgba(180,130,255,0.12); color: #b388ff; border: 1px solid rgba(180,130,255,0.2); }
  .rune-desc {
    font-size: 12px; color: #8a94a8; line-height: 1.6;
    min-height: 40px;
  }
  .rune-desc strong { color: #b0c4de; }

  /* Tags */
  .rune-tags {
    display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;
    padding: 8px 14px; position: relative; z-index: 1;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500; cursor: default;
    transition: all 0.2s;
  }
  .tag:hover { transform: scale(1.05); }
  .tag-strong { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
  .tag-godtier { background: linear-gradient(90deg, rgba(255,180,0,0.2), rgba(255,100,0,0.15)); color: #ffaa00; border: 1px solid rgba(255,180,0,0.4); animation: pulse 1.5s infinite; font-weight: 700; }
  .tag-hack { background: rgba(0,255,170,0.12); color: #00ffaa; border: 1px solid rgba(0,255,170,0.25); }
  .tag-bond { background: rgba(100,150,255,0.12); color: #88bbff; border: 1px solid rgba(100,150,255,0.25); }
  .tag-hot { background: rgba(255,100,50,0.12); color: #ff8844; border: 1px solid rgba(255,100,50,0.2); }
  .tag-cold { background: rgba(100,180,255,0.1); color: #77aadd; border: 1px solid rgba(100,180,255,0.15); }
  .tag-skip { background: rgba(255,200,50,0.1); color: #ccaa44; border: 1px solid rgba(255,200,50,0.15); }
  .tag-type { background: rgba(255,255,255,0.06); color: #8a94a8; border: 1px solid rgba(255,255,255,0.1); }

  /* ========== Per-card Refresh Button — 仿游戏底部按钮 ========== */
  .card-refresh-btn {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    width: 56px; height: 32px;
    margin: 0 auto 12px;
    border-radius: 6px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    border: 1.5px solid; transition: all 0.25s;
    background: rgba(20,30,50,0.9); position: relative; z-index: 1;
    letter-spacing: 0;
  }
  .card-refresh-btn.suggest {
    border-color: #ffa500; color: #ffa500;
    animation: pulse 1.5s infinite;
    background: rgba(255,165,0,0.08);
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,165,0,0.3)} 50%{box-shadow:0 0 12px 4px rgba(255,165,0,0.15)} }
  .card-refresh-btn.neutral {
    border-color: #4a6080; color: #7aa0cc;
    background: rgba(40,60,100,0.3);
  }
  .card-refresh-btn.dimmed {
    border-color: #2a3040; color: #444; cursor: default; pointer-events: none;
    background: rgba(20,25,35,0.5);
  }
  .card-refresh-btn:not(.dimmed):hover { transform: scale(1.08); background: rgba(255,255,255,0.06); }
  .refresh-summary {
    display: flex; align-items: center; gap: 8px;
    justify-content: center; margin-bottom: 12px;
    font-size: 12px; color: #7a8399;
  }
  .refresh-summary .highlight { color: #ffa500; font-weight: 600; }

  /* ========== Coach Panel ========== */
  .coach-panel {
    width: 720px; max-width: 95vw;
    background: linear-gradient(180deg, rgba(20,28,50,0.95), rgba(12,18,35,0.98));
    border: 1px solid #2a3454;
    border-radius: 12px; overflow: hidden;
    transition: all 0.3s ease;
  }
  .coach-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: rgba(201,168,76,0.06);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    cursor: pointer;
  }
  .coach-header:hover { background: rgba(201,168,76,0.1); }
  .coach-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: #c9a84c;
  }
  .coach-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, #c9a84c, #8a6a2a);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .coach-toggle {
    font-size: 18px; color: #7a8399; transition: transform 0.3s;
  }
  .coach-toggle.collapsed { transform: rotate(180deg); }
  .coach-body {
    padding: 12px 16px; line-height: 1.7;
    max-height: 200px; overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .coach-body.collapsed { max-height: 0; padding: 0 16px; }
  .coach-recommend {
    display: flex; align-items: flex-start; gap: 6px;
    margin-bottom: 8px;
  }
  .coach-recommend .icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
  .coach-recommend .text { font-size: 13px; }
  .coach-recommend .highlight { color: #ffd700; font-weight: 600; }
  .coach-recommend .secondary { color: #8a94a8; }
  .coach-sub {
    font-size: 12px; color: #6a7488; padding-left: 22px;
    border-left: 2px solid #2a3454; margin: 4px 0 4px 8px;
    padding-top: 2px; padding-bottom: 2px;
  }

  /* ========== Select Button ========== */
  .select-area {
    display: flex; justify-content: center; margin-top: 14px;
  }
  .select-btn {
    padding: 10px 48px; border-radius: 8px;
    font-size: 15px; font-weight: 700;
    background: linear-gradient(135deg, #c9a84c, #a08030);
    color: #1a0e00; border: none; cursor: pointer;
    transition: all 0.2s; letter-spacing: 2px;
  }
  .select-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(201,168,76,0.3); }
  .select-btn:disabled { background: #333; color: #666; cursor: default; transform: none; box-shadow:none; }

  /* ========== Scenario Switcher ========== */
  .scenario-bar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,14,26,0.95);
    border-bottom: 1px solid #1a2040;
    display: flex; align-items: center;
    padding: 8px 20px; gap: 12px;
    backdrop-filter: blur(8px);
  }
  .scenario-bar label {
    font-size: 12px; color: #7a8399; flex-shrink:0;
  }
  .scenario-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .scenario-tab {
    padding: 4px 14px; border-radius: 6px;
    font-size: 12px; cursor: pointer;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #8a94a8; transition: all 0.2s;
  }
  .scenario-tab:hover { background: rgba(255,255,255,0.1); }
  .scenario-tab.active {
    background: rgba(201,168,76,0.15);
    border-color: rgba(201,168,76,0.4);
    color: #c9a84c;
  }

  /* ========== Bond Popup ========== */
  .bond-popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 200; background: rgba(15,20,38,0.98);
    border: 1px solid #3a4a6a; border-radius: 14px;
    padding: 24px 28px; max-width: 380px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: none;
  }
  .bond-popup.show { display: block; animation: fadeIn 0.2s ease; }
  .bond-popup h3 { font-size: 15px; color: #88bbff; margin-bottom: 12px; display:flex; align-items:center; gap:6px; }
  .bond-progress {
    display: flex; gap: 6px; margin: 10px 0;
  }
  .bond-dot {
    width: 32px; height: 6px; border-radius: 3px;
    background: #2a3454;
  }
  .bond-dot.filled { background: linear-gradient(90deg, #4a90d9, #6db3f2); }
  .bond-effect { font-size: 12px; color: #8a94a8; margin-top: 8px; line-height: 1.6; }
  .bond-effect strong { color: #88bbff; }
  .bond-close {
    position: absolute; top: 10px; right: 14px;
    font-size: 18px; color: #555; cursor: pointer;
    background: none; border: none;
  }
  .bond-close:hover { color: #aaa; }

  /* ========== Hack Popup ========== */
  .hack-popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 200; background: rgba(10,22,20,0.98);
    border: 1px solid #1a5a4a; border-radius: 14px;
    padding: 24px 28px; max-width: 400px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: none;
  }
  .hack-popup.show { display: block; animation: fadeIn 0.2s ease; }
  .hack-popup h3 { font-size: 15px; color: #00ffaa; margin-bottom: 10px; display:flex; align-items:center; gap:6px; }
  .hack-chain {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin: 12px 0;
  }
  .hack-node {
    padding: 6px 12px; border-radius: 8px;
    background: rgba(0,255,170,0.08);
    border: 1px solid rgba(0,255,170,0.2);
    font-size: 12px; color: #00ffaa;
  }
  .hack-node.owned { background: rgba(0,255,170,0.2); font-weight: 600; }
  .hack-arrow { color: #1a5a4a; font-size: 16px; }
  .hack-desc { font-size: 12px; color: #8a94a8; line-height: 1.6; }
  .hack-close {
    position: absolute; top: 10px; right: 14px;
    font-size: 18px; color: #555; cursor: pointer;
    background: none; border: none;
  }
  .hack-close:hover { color: #aaa; }

  /* ========== Equip Popup ========== */
  .equip-popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 200; background: rgba(15,18,35,0.98);
    border: 1px solid #5a4a2a; border-radius: 14px;
    padding: 24px 28px; max-width: 420px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: none;
  }
  .equip-popup.show { display: block; animation: fadeIn 0.2s ease; }
  .equip-popup h3 { font-size: 15px; color: #daa520; margin-bottom: 12px; display:flex; align-items:center; gap:6px; }
  .equip-close {
    position: absolute; top: 10px; right: 14px;
    font-size: 18px; color: #555; cursor: pointer;
    background: none; border: none;
  }
  .equip-close:hover { color: #aaa; }

// ============================================================
// RENDER
// ============================================================
function render() {
  const sc = SCENARIOS[currentScenario];
  // Init per-card refresh state for this scenario if needed
  if (!cardRefreshUsed[sc.id]) {
    cardRefreshUsed[sc.id] = {};
  }
  renderScenarioTabs();
  renderHeader(sc);
  renderCards(sc);
  renderRefreshSummary(sc);
  renderCoach(sc);
  selectedCard = -1;
  document.getElementById('selectBtn').disabled = true;
}

function renderScenarioTabs() {
  const container = document.getElementById('scenarioTabs');
  container.innerHTML = SCENARIOS.map((s, i) =>
    `<div class="scenario-tab ${i === currentScenario ? 'active' : ''}" onclick="switchScenario(${i})">${s.label}</div>`
  ).join('');
}

function renderHeader(sc) {
  document.getElementById('stageText').textContent = `请选择一个强化符文 · ${sc.stage}`;
  document.getElementById('heroAvatar').textContent = sc.hero.avatar;
  document.getElementById('heroName').textContent = sc.hero.name;
  document.getElementById('heroRole').textContent = sc.hero.role;
  const owned = sc.ownedRunes ? `已拥有：${sc.ownedRunes.join('、')}` : '首次选择';
  const quality = sc.quality || sc.runes[0].quality;
  const qualityName = qualityLabel(quality);
  document.getElementById('stageBadge').textContent = `第 ${sc.stageIndex}/4 次选择 · ${qualityName} · ${owned}`;
}

function renderTags(tags, cardIdx) {
  return tags.map(function(t) {
    if (t.type === 'bond') return '<span class="tag tag-' + t.type + '" onclick="event.stopPropagation();showBond(' + cardIdx + ')">' + t.text + '</span>';
    if (t.type === 'hack') return '<span class="tag tag-' + t.type + '" onclick="event.stopPropagation();showHack(' + cardIdx + ')">' + t.text + '</span>';
    if (t.type === 'equip') return '<span class="tag tag-' + t.type + '" onclick="event.stopPropagation();showEquip(' + cardIdx + ')">' + t.text + '</span>';
    return '<span class="tag tag-' + t.type + '">' + t.text + '</span>';
  }).join('');
}

function renderCards(sc) {
  const row = document.getElementById('cardsRow');
  const used = cardRefreshUsed[sc.id] || {};
  const quality = sc.quality || sc.runes[0].quality;
  
  row.innerHTML = sc.runes.map((r, i) => {
    const glowClass = r.grade === 'S' ? 'glow-s' : r.grade === 'A' ? 'glow-a' : r.grade === 'B' ? 'glow-b' : '';
    const selClass = selectedCard === i ? 'selected' : '';
    const isUsed = !!used[i];
    const refreshClass = isUsed ? 'dimmed' : (r.refreshAdvice || 'neutral');
    const refreshText = isUsed ? '—' : 'C';
    const helpIcon = r.needHelp ? `<div class="help-icon" onclick="event.stopPropagation();showHelp(${i})" title="点击了解详细机制">?</div>` : '';
    const rerollRateClass = r.rerollRate >= 40 ? 'high' : r.rerollRate < 15 ? 'low' : 'mid';
    return `
      <div class="rune-card quality-${quality} ${glowClass} ${selClass}" 
           onclick="selectRune(${i})"
           onmouseenter="hoverRune(${i})"
           onmouseleave="unhoverRune()">
        <div class="card-corner-tl"></div>
        <div class="card-corner-tr"></div>
        ${helpIcon}
        <div class="grade-badge grade-${r.grade}">${r.grade}</div>
        <div class="quality-stripe quality-${quality}"></div>
        <div class="rune-icon-area">
          <div class="rune-icon ${quality}">${r.icon}</div>
        </div>
        <div class="rune-body">
          <div class="rune-name">${r.name}</div>
          <div class="rune-type-label ${quality}">${r.typeTag}</div>
          <div class="rune-desc">${r.desc}</div>
        </div>
        <div class="rune-tags">
          ${renderTags(r.tags, i)}
        </div>
        <div class="reroll-rate">
          <span class="label">刷新指数：</span>
          <span class="value ${rerollRateClass}">${r.rerollRate}%</span>
        </div>
        <button class="card-refresh-btn ${refreshClass}" onclick="event.stopPropagation();doCardRefresh(${i})"
                title="${isUsed ? '已刷新' : '刷新此符文 (每个符文可刷新一次)'}">
          ${refreshText}
        </button>
      </div>`;
  }).join('');
}

function qualityLabel(q) {
  return { silver: '银色品质', gold: '金色品质', prismatic: '棱彩品质' }[q] || '';
}

function renderRefreshSummary(sc) {
  const area = document.getElementById('refreshSummary');
  const used = cardRefreshUsed[sc.id] || {};
  const totalRefreshes = sc.runes.length;
  const usedCount = Object.keys(used).length;
  const remaining = totalRefreshes - usedCount;
  
  // Check coach suggestion
  const suggestCount = sc.runes.filter((r, i) => !used[i] && r.refreshAdvice === 'suggest').length;
  const hasSGrade = sc.runes.some(r => r.grade === 'S');
  
  let hint = '';
  if (hasSGrade) {
    hint = `<span class="highlight" style="color:#ffaa00">🌟 有天胡符文！别刷新，直接拿</span>`;
  } else if (suggestCount > 0) {
    hint = `<span class="highlight">教练建议：有 ${suggestCount} 个符文值得刷新</span>`;
  } else if (remaining === 0) {
    hint = '所有符文刷新机会已用完';
  } else {
    hint = '每个符文各有一次独立刷新机会，按需使用';
  }
  area.innerHTML = `💡 剩余刷新次数：${remaining}/${totalRefreshes} · ${hint}`;
}

function renderCoach(sc) {
  const body = document.getElementById('coachBody');
  if (sc.coachMain.idx === null) {
    body.innerHTML = `
      <div class="coach-recommend">
        <span class="icon">⚠️</span>
        <span class="text">这三个都比较弱，<span class="highlight">建议逐个刷新试试运气</span>。每个符文都有独立的刷新机会，可以一个一个刷。</span>
      </div>
    `;
  } else {
    const mainRune = sc.runes[sc.coachMain.idx];
    const gradeIcon = mainRune.grade === 'S' ? '🌟' : '💡';
    const gradeLabel = mainRune.grade === 'S' ? '<span style="color:#ffaa00;font-weight:700">天胡！</span> ' : '';
    body.innerHTML = `
      <div class="coach-recommend">
        <span class="icon">${gradeIcon}</span>
        <span class="text">${gradeLabel}推荐选 <span class="highlight">【${mainRune.name}】</span> — ${sc.coachMain.reason}</span>
      </div>
      <div class="coach-recommend" style="margin-top:4px;">
        <span class="icon" style="opacity:0">${gradeIcon}</span>
        <span class="text secondary" style="font-size:12px">"${mainRune.coachLine}"</span>
      </div>
      ${sc.coachSubs.map(s => `<div class="coach-sub">${s}</div>`).join('')}
    `;
  }
  coachCollapsed = false;
  document.getElementById('coachBody').classList.remove('collapsed');
  document.getElementById('coachToggle').classList.remove('collapsed');
}

// INTERACTIONS
// ============================================================
function switchScenario(i) {
  currentScenario = i;
  render();
}

function selectRune(i) {
  selectedCard = i;
  document.querySelectorAll('.rune-card').forEach((c, idx) => {
    c.classList.toggle('selected', idx === i);
  });
  document.getElementById('selectBtn').disabled = false;
}

function hoverRune(i) {
  const sc = SCENARIOS[currentScenario];
  const r = sc.runes[i];
  const body = document.getElementById('coachBody');
  if (coachCollapsed) return;
  
  let equipHint = '';
  if (r.equipInfo) {
    const eq = EQUIP_KNOWLEDGE[r.equipInfo.category];
    if (eq) {
      equipHint = `<div class="coach-sub" style="border-left-color:#daa520;color:#c9a84c">📦 涉及装备类型：${r.equipInfo.category}（${eq.items.length}件） — 点击标签查看完整列表</div>`;
    }
  }
  
  body.innerHTML = `
    <div class="coach-recommend">
      <span class="icon">🔍</span>
      <span class="text"><span class="highlight">【${r.name}】</span>详细解读</span>
    </div>
    <div class="coach-recommend" style="margin-top:4px">
      <span class="icon" style="opacity:0">🔍</span>
      <span class="text secondary" style="font-size:12px">"${r.coachLine}"</span>
    </div>
    <div class="coach-sub">效果类型：${r.typeTag} · 品质：${qualityLabel(sc.quality || r.quality)} · 推荐指数：${r.grade} · 刷新指数：${r.rerollRate}%</div>
    ${equipHint}
  `;
}

function unhoverRune() {
  const sc = SCENARIOS[currentScenario];
  if (coachCollapsed) return;
  renderCoach(sc);
}

document.getElementById('coachHeader').addEventListener('click', () => {
  coachCollapsed = !coachCollapsed;
  document.getElementById('coachBody').classList.toggle('collapsed', coachCollapsed);
  document.getElementById('coachToggle').classList.toggle('collapsed', coachCollapsed);
});

// Per-card refresh
function doCardRefresh(cardIdx) {
  const sc = SCENARIOS[currentScenario];
  if (!cardRefreshUsed[sc.id]) cardRefreshUsed[sc.id] = {};
  if (cardRefreshUsed[sc.id][cardIdx]) return;
  
  cardRefreshUsed[sc.id][cardIdx] = true;
  const quality = sc.quality || sc.runes[0].quality;
  
  // Check if there's a replacement rune
  const pool = CARD_REFRESH_POOL[sc.id];
  if (pool && pool[cardIdx]) {
    const replacement = pool[cardIdx];
    replacement.quality = quality; // 确保品质一致
    sc.runes[cardIdx] = replacement;
  } else {
    // Random upgrade simulation: bump grade by one level
    const r = sc.runes[cardIdx];
    const grades = ['D', 'C', 'B', 'A'];
    const curIdx = grades.indexOf(r.grade);
    if (curIdx < grades.length - 1) {
      r.grade = grades[curIdx + 1];
      r.winRate = Math.min(r.winRate + 3.5, 58);
    }
    r.quality = quality; // 确保品质一致
    r.refreshAdvice = 'dimmed';
  }
  
  // Update coach if the main recommended card changed
  updateCoachAfterRefresh(sc);
  
  renderCards(sc);
  renderRefreshSummary(sc);
  renderCoach(sc);
  selectedCard = -1;
  document.getElementById('selectBtn').disabled = true;
}

function updateCoachAfterRefresh(sc) {
  // Find the best grade card
  const grades = { 'S': 5, 'A': 4, 'B': 3, 'C': 2, 'D': 1 };
  let bestIdx = 0, bestScore = 0;
  sc.runes.forEach((r, i) => {
    const score = (grades[r.grade] || 0) * 10 + r.winRate;
    if (score > bestScore) { bestScore = score; bestIdx = i; }
  });
  if (sc.coachMain.idx !== null) {
    sc.coachMain.idx = bestIdx;
  }
}

    <div class="bond-progress">
      ${Array.from({length: b.total}, (_, j) => `<div class="bond-dot ${j < b.current ? 'filled' : ''}"></div>`).join('')}
    </div>
    <div class="bond-effect">
      ${b.effects.map(e => `<div style="margin:4px 0"><strong>${e.count}件：</strong>${e.text}</div>`).join('')}
    </div>
  `;
  popup.classList.add('show');
  document.getElementById('popupBackdrop').classList.add('show');
}

// Hack popup
function showHack(i) {
  const sc = SCENARIOS[currentScenario];
  const r = sc.runes[i];
  if (!r.hackCombo) return;
  const h = r.hackCombo;
  const popup = document.getElementById('hackPopup');
  popup.innerHTML = `
    <button class="hack-close" onclick="closePopups()">✕</button>
    <h3>🧪 黑科技：${h.name}</h3>
    <div class="hack-chain">
      ${h.nodes.map((n, j) => `
        ${j > 0 ? '<span class="hack-arrow">+</span>' : ''}
        <span class="hack-node ${h.owned.includes(n) ? 'owned' : ''}">${n}${h.owned.includes(n) ? ' ✓' : ''}</span>
      `).join('')}
    </div>
    <div class="hack-desc">${h.desc}</div>
  `;
  popup.classList.add('show');
  document.getElementById('popupBackdrop').classList.add('show');
}

// Help popup (? icon)
function showHelp(i) {
  const sc = SCENARIOS[currentScenario];
  const r = sc.runes[i];
  if (!r.needHelp) return;
  
  const popup = document.getElementById('helpPopup');
  popup.innerHTML = `
    <button class="help-close" onclick="closePopups()">✕</button>
    <h3>❓ ${r.name} — 详细解读</h3>
    <div class="help-detail">${r.helpDetail || r.desc}</div>
    ${r.helpScenario ? `<div class="help-scenario"><strong>使用场景：</strong>${r.helpScenario}</div>` : ''}
  `;
  popup.classList.add('show');
  document.getElementById('popupBackdrop').classList.add('show');
}

function closePopups() {
  document.getElementById('bondPopup').classList.remove('show');
  document.getElementById('hackPopup').classList.remove('show');
  document.getElementById('equipPopup').classList.remove('show');
  document.getElementById('helpPopup').classList.remove('show');
  document.getElementById('popupBackdrop').classList.remove('show');
}
document.getElementById('popupBackdrop').addEventListener('click', closePopups);

document.getElementById('selectBtn').addEventListener('click', () => {
  if (selectedCard < 0) return;
  const sc = SCENARIOS[currentScenario];
  const r = sc.runes[selectedCard];
  alert(`✅ 已选择【${r.name}】\n\n这是 Demo 演示，实际游戏中此时符文生效并关闭选择界面。`);
});

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
